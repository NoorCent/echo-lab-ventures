<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 220" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Phone body -->
  <rect x="95" y="15" width="80" height="155" rx="12"/>
  <!-- Screen -->
  <rect x="103" y="35" width="64" height="115" rx="4"/>
  <!-- Notch -->
  <line x1="125" y1="25" x2="145" y2="25"/>
  <!-- Home indicator -->
  <line x1="122" y1="160" x2="148" y2="160"/>

  <!-- App grid on screen -->
  <rect x="112" y="48" width="18" height="18" rx="4"/>
  <rect x="138" y="48" width="18" height="18" rx="4"/>
  <rect x="112" y="74" width="18" height="18" rx="4"/>
  <rect x="138" y="74" width="18" height="18" rx="4"/>

  <!-- List items -->
  <line x1="112" y1="105" x2="155" y2="105"/>
  <line x1="112" y1="115" x2="148" y2="115"/>
  <line x1="112" y1="125" x2="142" y2="125"/>

  <!-- Notification bell (floating) -->
  <path d="M60 55 C60 45, 75 45, 75 55 L75 65 L55 65 Z"/>
  <circle cx="67" cy="70" r="3"/>
  <line x1="67" y1="40" x2="67" y2="45"/>

  <!-- Connection line to phone -->
  <path d="M75 58 Q88 58 95 55" stroke-dasharray="4 3"/>

  <!-- Upload/sync arrows -->
  <line x1="200" y1="70" x2="200" y2="50"/>
  <polyline points="193,57 200,50 207,57"/>
  <line x1="215" y1="60" x2="215" y2="80"/>
  <polyline points="208,73 215,80 222,73"/>

  <!-- Sparkles -->
  <line x1="50" y1="100" x2="50" y2="110"/>
  <line x1="45" y1="105" x2="55" y2="105"/>

  <line x1="230" y1="35" x2="230" y2="45"/>
  <line x1="225" y1="40" x2="235" y2="40"/>

  <line x1="43" y1="145" x2="43" y2="153"/>
  <line x1="39" y1="149" x2="47" y2="149"/>

  <!-- Touch gesture circle -->
  <circle cx="210" cy="130" r="14" stroke-dasharray="4 3"/>
  <circle cx="210" cy="130" r="3" fill="#1a1a1a" stroke="none"/>

  <!-- Wifi signal -->
  <path d="M55 160 Q67 148, 79 160" fill="none"/>
  <path d="M60 160 Q67 153, 74 160" fill="none"/>
  <circle cx="67" cy="162" r="2" fill="#1a1a1a" stroke="none"/>
</svg>
