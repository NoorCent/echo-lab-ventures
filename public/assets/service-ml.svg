<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 220" fill="none" stroke="#1a1a1a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <!-- Monitor / dashboard screen -->
  <rect x="60" y="25" width="145" height="100" rx="8"/>
  <line x1="60" y1="48" x2="205" y2="48"/>
  <!-- Browser dots -->
  <circle cx="74" cy="37" r="3" fill="#1a1a1a" stroke="none" opacity="0.3"/>
  <circle cx="85" cy="37" r="3" fill="#1a1a1a" stroke="none" opacity="0.3"/>
  <circle cx="96" cy="37" r="3" fill="#1a1a1a" stroke="none" opacity="0.3"/>

  <!-- Line chart inside monitor -->
  <polyline points="75,100 90,88 105,93 120,72 135,78 150,62 165,68 180,55 190,60" stroke-width="2.2"/>
  <!-- Chart dots -->
  <circle cx="75" cy="100" r="2.5" fill="#1a1a1a" stroke="none"/>
  <circle cx="105" cy="93" r="2.5" fill="#1a1a1a" stroke="none"/>
  <circle cx="120" cy="72" r="2.5" fill="#1a1a1a" stroke="none"/>
  <circle cx="150" cy="62" r="2.5" fill="#1a1a1a" stroke="none"/>
  <circle cx="180" cy="55" r="2.5" fill="#1a1a1a" stroke="none"/>
  <!-- Shaded area under chart -->
  <path d="M75,100 L90,88 L105,93 L120,72 L135,78 L150,62 L165,68 L180,55 L190,60 L190,115 L75,115 Z" fill="#1a1a1a" opacity="0.06" stroke="none"/>
  <!-- Grid lines -->
  <line x1="75" y1="75" x2="195" y2="75" stroke-opacity="0.1"/>
  <line x1="75" y1="90" x2="195" y2="90" stroke-opacity="0.1"/>
  <line x1="75" y1="105" x2="195" y2="105" stroke-opacity="0.1"/>

  <!-- Monitor stand -->
  <line x1="120" y1="125" x2="120" y2="145"/>
  <line x1="145" y1="125" x2="145" y2="145"/>
  <line x1="105" y1="145" x2="160" y2="145"/>

  <!-- Pie chart (left side) -->
  <circle cx="30" cy="80" r="22"/>
  <line x1="30" y1="80" x2="30" y2="58"/>
  <line x1="30" y1="80" x2="49" y2="90"/>
  <line x1="30" y1="80" x2="15" y2="95"/>
  <!-- Pie fills -->
  <path d="M30,80 L30,58 A22,22 0 0,1 49,90 Z" fill="#1a1a1a" opacity="0.12" stroke="none"/>
  <path d="M30,80 L15,95 A22,22 0 0,1 30,58 Z" fill="#1a1a1a" opacity="0.06" stroke="none"/>

  <!-- Bar chart (right side) -->
  <rect x="222" y="95" width="9" height="25" rx="1.5" fill="#1a1a1a" opacity="0.1" stroke="#1a1a1a"/>
  <rect x="235" y="80" width="9" height="40" rx="1.5" fill="#1a1a1a" opacity="0.15" stroke="#1a1a1a"/>
  <rect x="248" y="65" width="9" height="55" rx="1.5" fill="#1a1a1a" opacity="0.2" stroke="#1a1a1a"/>
  <line x1="218" y1="120" x2="262" y2="120"/>
  <!-- Trend arrow above bars -->
  <polyline points="226,93 240,78 253,63" stroke-width="1.5" stroke-dasharray="3 2"/>
  <polyline points="250,60 253,63 256,60" stroke-width="1.5"/>

  <!-- Data table / spreadsheet (bottom left) -->
  <rect x="18" y="135" width="55" height="45" rx="4"/>
  <!-- Table rows -->
  <line x1="18" y1="148" x2="73" y2="148"/>
  <line x1="18" y1="158" x2="73" y2="158"/>
  <line x1="18" y1="168" x2="73" y2="168"/>
  <!-- Table columns -->
  <line x1="38" y1="135" x2="38" y2="180"/>
  <line x1="56" y1="135" x2="56" y2="180"/>
  <!-- Header fills -->
  <rect x="18" y="135" width="55" height="13" rx="4" fill="#1a1a1a" opacity="0.08" stroke="none"/>
  <!-- Small data dots in cells -->
  <circle cx="28" cy="153" r="1.5" fill="#1a1a1a" opacity="0.3" stroke="none"/>
  <circle cx="47" cy="153" r="1.5" fill="#1a1a1a" opacity="0.3" stroke="none"/>
  <circle cx="64" cy="153" r="1.5" fill="#1a1a1a" opacity="0.3" stroke="none"/>
  <circle cx="28" cy="163" r="1.5" fill="#1a1a1a" opacity="0.3" stroke="none"/>
  <circle cx="47" cy="163" r="1.5" fill="#1a1a1a" opacity="0.3" stroke="none"/>
  <circle cx="64" cy="163" r="1.5" fill="#1a1a1a" opacity="0.3" stroke="none"/>
  <circle cx="28" cy="173" r="1.5" fill="#1a1a1a" opacity="0.3" stroke="none"/>
  <circle cx="47" cy="173" r="1.5" fill="#1a1a1a" opacity="0.3" stroke="none"/>
  <circle cx="64" cy="173" r="1.5" fill="#1a1a1a" opacity="0.3" stroke="none"/>

  <!-- Arrow from table to monitor -->
  <path d="M55 135 Q65 132 75 125" stroke-dasharray="3 2" stroke-opacity="0.4"/>

  <!-- Magnifying glass (bottom right) -->
  <circle cx="235" cy="155" r="16"/>
  <line x1="247" y1="167" x2="257" y2="177" stroke-width="3"/>
  <!-- Graph inside magnifier -->
  <polyline points="225,160 230,152 236,158 242,148" stroke-width="1.5"/>

  <!-- Funnel / filter icon (top right) -->
  <path d="M225 25 L255 25 L245 42 L245 55 L235 55 L235 42 Z"/>

  <!-- Sparkles -->
  <line x1="42" y1="30" x2="42" y2="40"/>
  <line x1="37" y1="35" x2="47" y2="35"/>
  <line x1="215" y1="135" x2="215" y2="143"/>
  <line x1="211" y1="139" x2="219" y2="139"/>

  <!-- Floating percentage -->
  <text x="225" y="40" font-size="7" font-family="sans-serif" fill="#1a1a1a" opacity="0.35" stroke="none">%</text>

  <!-- Connection dots -->
  <circle cx="210" cy="55" r="2" fill="#1a1a1a" opacity="0.25" stroke="none"/>
  <circle cx="218" cy="50" r="2" fill="#1a1a1a" opacity="0.25" stroke="none"/>
</svg>
