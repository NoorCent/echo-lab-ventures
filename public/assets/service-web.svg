<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 220" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Monitor -->
  <rect x="50" y="30" width="160" height="110" rx="8"/>
  <line x1="110" y1="140" x2="110" y2="170"/>
  <line x1="150" y1="140" x2="150" y2="170"/>
  <line x1="90" y1="170" x2="170" y2="170"/>

  <!-- Browser bar -->
  <line x1="50" y1="55" x2="210" y2="55"/>
  <circle cx="68" cy="43" r="4" fill="#1a1a1a" stroke="none"/>
  <circle cx="82" cy="43" r="4" fill="#1a1a1a" stroke="none"/>
  <circle cx="96" cy="43" r="4" fill="#1a1a1a" stroke="none"/>

  <!-- Code lines -->
  <line x1="65" y1="72" x2="105" y2="72"/>
  <line x1="75" y1="85" x2="130" y2="85"/>
  <line x1="75" y1="98" x2="115" y2="98"/>
  <line x1="65" y1="111" x2="95" y2="111"/>

  <!-- Layout panel -->
  <rect x="140" y="65" width="55" height="55" rx="4" stroke-dasharray="4 3"/>

  <!-- Gear on panel -->
  <circle cx="167" cy="92" r="12"/>
  <circle cx="167" cy="92" r="5"/>
  <line x1="167" y1="76" x2="167" y2="80"/>
  <line x1="167" y1="104" x2="167" y2="108"/>
  <line x1="151" y1="92" x2="155" y2="92"/>
  <line x1="179" y1="92" x2="183" y2="92"/>

  <!-- Connection nodes -->
  <circle cx="38" cy="70" r="4" fill="#1a1a1a" stroke="none"/>
  <line x1="42" y1="70" x2="50" y2="70"/>
  <circle cx="38" cy="100" r="4" fill="#1a1a1a" stroke="none"/>
  <line x1="42" y1="100" x2="50" y2="100"/>

  <!-- Sparkles -->
  <line x1="225" y1="35" x2="225" y2="45"/>
  <line x1="220" y1="40" x2="230" y2="40"/>
  <line x1="235" y1="55" x2="235" y2="63"/>
  <line x1="231" y1="59" x2="239" y2="59"/>

  <line x1="30" y1="140" x2="30" y2="150"/>
  <line x1="25" y1="145" x2="35" y2="145"/>

  <!-- Cursor arrow -->
  <path d="M220 120 L220 145 L228 138 L237 152" stroke-width="2.5"/>
</svg>
